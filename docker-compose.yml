services:
  postgres:
    image: postgres:17
    container_name: postgres-notes-container
    restart: always
    environment:
      POSTGRES_PASSWORD: root_password
      POSTGRES_DB: postgres_notes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
